<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>돌려돌려 돌림판 | VICXXO GALLERY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     ★ 비율 수정은 여기 SEGMENTS 배열(아래 <script>)에서 합니다 ★
     현재 12칸 기준: 1등 1칸 / 2등 2칸 / 3등 6칸 / 꽝 3칸
     실물 돌림판과 칸 수가 다르면 SEGMENTS만 고치면 됩니다.
  ========================================================= */
  :root{
    --c-1deung:#FF5A5F;   /* 1등: 빨강 (원복) */
    --c-2deung:#FF9F45;   /* 2등: 주황 (원복) */
    --c-3deung:#FFE785;   /* 3등: 메인 옐로 PANTONE 2002U */
    --c-kkwang:#FEFAED;   /* 꽝 : 베이스 크림 */
    --ink:#000000;        /* 텍스트/외곽선 */
    --brown:#866A55;      /* 중간 강조 */
    --yellow:#FFE785;     /* 메인 */
    --base:#FEFAED;       /* 베이스 배경 */
    --cream:#FEFAED;
    --peach:#FFE785;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Jua',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 18% 12%, rgba(255,231,133,.6) 0, transparent 45%),
      radial-gradient(circle at 85% 85%, rgba(255,231,133,.4) 0, transparent 50%),
      #FEFAED;
    background-attachment:fixed;
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:18px 16px 36px;
    overflow-x:hidden;
    position:relative;
  }
  /* 점 패턴 텍스처 */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:radial-gradient(rgba(134,106,85,.12) 1.4px, transparent 1.4px);
    background-size:22px 22px;
  }
  .stage{position:relative;z-index:1;width:100%;max-width:440px;display:flex;flex-direction:column;align-items:center;}

  /* ---------- 헤더 ---------- */
  .titleblock{display:flex;flex-direction:column;align-items:center;margin-bottom:4px;}
  .brandline{
    font-family:'Black Han Sans';font-weight:400;
    font-size:clamp(15px,4.6vw,19px);color:#000;letter-spacing:1px;
    background:var(--yellow);border:3px solid var(--ink);border-radius:999px;
    padding:0 20px;height:34px;display:inline-flex;align-items:center;justify-content:center;
    box-shadow:3px 3px 0 var(--ink);
  }
  .maintitle{
    font-family:'Black Han Sans';font-weight:400;color:var(--ink);
    font-size:clamp(42px,13.5vw,58px);line-height:.9;letter-spacing:-1px;
    text-align:center;margin-top:10px;
    text-shadow:3px 3px 0 #fff, 5px 5px 0 var(--yellow);
  }
  .bang{color:var(--brown);display:inline-block;transform:rotate(9deg);}
  .sub{font-size:14px;color:var(--brown);margin-bottom:30px;text-align:center;}

  /* ---------- 휠 ---------- */
  .wheel-wrap{
    position:relative;width:min(86vw,380px);aspect-ratio:1;margin:6px 0 4px;
    filter:drop-shadow(0 14px 22px rgba(134,106,85,.32));
  }
  .wheel{
    width:100%;height:100%;transform-origin:50% 50%;
    transition:transform 5.4s cubic-bezier(.16,.84,.27,1);
    will-change:transform;
  }
  .wheel.ready{transition:none;}
  /* 바깥 테두리 도트 */
  .rim{position:absolute;inset:-3%;border-radius:50%;
    background:repeating-conic-gradient(var(--ink) 0 6deg, var(--base) 6deg 12deg);
    z-index:-1;}
  /* 중앙 허브 (회전 안 함) */
  .hub{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:33%;aspect-ratio:1;border-radius:50%;overflow:hidden;
    background:#ffffff;border:4px solid var(--ink);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
    z-index:5;
  }
  .hublogo{width:90%;height:90%;object-fit:contain;}
  /* 포인터 (상단 고정) */
  .pointer{
    position:absolute;left:50%;top:-12px;transform:translateX(-50%);
    z-index:6;width:0;height:0;
    border-left:17px solid transparent;border-right:17px solid transparent;
    border-top:30px solid var(--yellow);
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.3));
  }
  .pointer::after{content:"";position:absolute;left:-17px;top:-34px;
    border-left:17px solid transparent;border-right:17px solid transparent;
    border-top:30px solid var(--ink);z-index:-1;transform:scale(1.18);}

  /* ---------- 버튼 ---------- */
  .spin-btn{
    font-family:'Black Han Sans';font-size:24px;letter-spacing:2px;color:#fff;
    background:linear-gradient(180deg,#FF6B5B,#E8402F);
    border:3px solid var(--ink);border-radius:18px;
    padding:16px 0;width:min(80vw,320px);margin-top:30px;cursor:pointer;
    box-shadow:0 6px 0 var(--ink),0 10px 16px rgba(200,60,40,.35);
    transition:transform .08s, box-shadow .08s;
  }
  .spin-btn:active{transform:translateY(5px);box-shadow:0 1px 0 var(--ink);}
  .spin-btn:disabled{filter:grayscale(.5) brightness(.95);cursor:not-allowed;
    box-shadow:0 4px 0 var(--ink);opacity:.85;}

  /* ---------- 경품 안내 ---------- */
  .prizes{width:min(90vw,400px);margin-top:22px;background:#fff;
    border:3px solid var(--ink);border-radius:18px;overflow:hidden;
    box-shadow:5px 5px 0 var(--ink);}
  .prizes h2{font-family:'Black Han Sans';font-size:16px;background:var(--yellow);
    color:#000;text-align:center;padding:9px;letter-spacing:2px;border-bottom:3px solid var(--ink);}
  .prow{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:2px dashed rgba(134,106,85,.3);font-size:14px;}
  .prow:last-child{border-bottom:none;}
  .rank{font-family:'Black Han Sans';width:42px;height:42px;flex:none;border-radius:12px;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;border:2px solid var(--ink);}
  .r1{background:var(--c-1deung);} .r2{background:var(--c-2deung);}
  .r3{background:var(--c-3deung);color:var(--ink);} .rk{background:var(--c-kkwang);color:var(--ink);}
  .pname{font-weight:400;color:var(--ink);}

  .foot{margin-top:18px;font-size:11px;letter-spacing:2px;color:var(--brown);}

  /* ---------- 결과 모달 ---------- */
  .overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.55);
    backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:24px;}
  .overlay.show{display:flex;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{background:var(--base);border:4px solid var(--ink);border-radius:26px;
    width:100%;max-width:340px;padding:30px 24px 26px;text-align:center;
    box-shadow:8px 8px 0 var(--ink);animation:pop .4s cubic-bezier(.2,1.3,.4,1);}
  @keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
  .card .emoji{font-size:52px;line-height:1;margin-bottom:6px;}
  .card .res-rank{font-family:'Black Han Sans';font-size:38px;margin:0 0 4px;letter-spacing:1px;}
  .card .res-prize{font-size:18px;color:var(--ink);margin-bottom:4px;}
  .card .res-msg{font-size:14px;color:var(--brown);margin-bottom:20px;}
  .again{font-family:'Black Han Sans';font-size:18px;color:var(--ink);background:#fff;
    border:3px solid var(--ink);border-radius:14px;padding:13px 0;width:100%;cursor:pointer;
    box-shadow:0 5px 0 var(--ink);letter-spacing:1px;transition:transform .08s,box-shadow .08s;}
  .again:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ink);}

  #confetti{position:fixed;inset:0;z-index:60;pointer-events:none;display:none;}
</style>
</head>

<script>
/* =========================================================
   ★★ 당첨 확률 설정 (가중치 방식) ★★
   WEIGHTS 의 숫자 = 실제 당첨 확률(%). 합계 100 권장.
   휠 칸 수와 무관하게 이 값으로 당첨됩니다.
   현재: 꽝 70 / 3등 20 / 2등 7 / 1등 3  (더 절약형)
========================================================= */
const WEIGHTS = { 'kkwang':70, '3deung':20, '2deung':7, '1deung':3 };

const PRIZE = {
  '1deung':{label:'1등', name:'TU1 여행용 멀티 어댑터', color:'var(--c-1deung)', txt:'#fff',  emoji:'🏆', msg:'대박! 최고 경품 당첨이에요!'},
  '2deung':{label:'2등', name:'V3 자바라 거치대',       color:'var(--c-2deung)', txt:'#fff', emoji:'🥈', msg:'축하합니다! 2등 당첨!'},
  '3deung':{label:'3등', name:'W1 9V 무선충전기',       color:'var(--c-3deung)', txt:'#000', emoji:'🥉', msg:'좋아요! 3등 당첨!'},
  'kkwang':{label:'꽝',  name:'코냥이 스티커',       color:'var(--c-kkwang)', txt:'#000', emoji:'🔥', msg:'꽝! 코냥이 스티커 받고 다음 기회에~'},
};
// 휠 시각 배치 (12칸) - 꽝이 가장 많아 보이도록 / 사이사이 꽝으로 구분
const SEGMENTS = [
  '1deung','kkwang','3deung','kkwang','2deung','kkwang',
  '3deung','kkwang','2deung','kkwang','3deung','kkwang'
];

const N = SEGMENTS.length;
const SEG = 360 / N;
const wheel = document.getElementById('wheel');
const NS = 'http://www.w3.org/2000/svg';

function pt(cx,cy,r,deg){ // 0deg = 상단(12시), 시계방향
  const a=(deg-90)*Math.PI/180; // -90 보정: 0=top
  return [cx+r*Math.cos(a), cy+r*Math.sin(a)];
}
// 슬라이스 그리기
SEGMENTS.forEach((key,i)=>{
  const p = PRIZE[key];
  const a0=i*SEG, a1=(i+1)*SEG, mid=i*SEG+SEG/2;
  const [x0,y0]=pt(200,200,190,a0);
  const [x1,y1]=pt(200,200,190,a1);
  const path=document.createElementNS(NS,'path');
  path.setAttribute('d',`M200 200 L${x0} ${y0} A190 190 0 0 1 ${x1} ${y1} Z`);
  path.setAttribute('fill',p.color);
  path.setAttribute('stroke','#3a2a1a');
  path.setAttribute('stroke-width','2.5');
  wheel.appendChild(path);
  // 라벨
  const [lx,ly]=pt(200,200,128,mid);
  const t=document.createElementNS(NS,'text');
  t.setAttribute('x',lx); t.setAttribute('y',ly);
  t.setAttribute('fill',p.txt);
  t.setAttribute('text-anchor','middle');
  t.setAttribute('dominant-baseline','central');
  t.setAttribute('font-family','Black Han Sans, sans-serif');
  t.setAttribute('font-size', p.label.length>1?'22':'30');
  t.setAttribute('transform',`rotate(${mid} ${lx} ${ly})`);
  t.textContent=p.label;
  wheel.appendChild(t);
});

let rotation=0, spinning=false;
const btn=document.getElementById('spinBtn');
const overlay=document.getElementById('overlay');

function spin(){
  if(spinning) return;
  spinning=true; btn.disabled=true; btn.textContent='두근두근…';
  // 1) 가중치로 당첨 등수 결정
  const keys=Object.keys(WEIGHTS);
  const total=keys.reduce((s,k)=>s+WEIGHTS[k],0);
  let r=Math.random()*total, win=keys[keys.length-1];
  for(const key of keys){ if(r<WEIGHTS[key]){win=key;break;} r-=WEIGHTS[key]; }
  // 2) 그 등수에 해당하는 휠 칸 중 하나를 골라 멈춤
  const slots=SEGMENTS.map((s,i)=>s===win?i:-1).filter(i=>i>=0);
  const k=slots[Math.floor(Math.random()*slots.length)];
  const mid=k*SEG+SEG/2;
  const jitter=(Math.random()*20-10);            // 슬라이스 내 ±10도
  const toTop=(360-(mid%360))%360;               // mid를 상단으로
  const base=rotation-(rotation%360);
  let target=base+360*6+toTop+jitter;
  if(target<=rotation) target+=360;
  rotation=target;
  wheel.classList.remove('ready');
  wheel.style.transform=`rotate(${rotation}deg)`;
  setTimeout(()=>showResult(SEGMENTS[k]),5500);
}

function showResult(key){
  const p=PRIZE[key];
  document.getElementById('resEmoji').textContent=p.emoji;
  const rk=document.getElementById('resRank');
  // 크림 배경에서 잘 보이도록 등수 글자색을 가독성 있는 값으로 매핑
  const RANK_COLOR={'1deung':'#FF5A5F','2deung':'#F0871E','3deung':'#D9A400','kkwang':'#866A55'};
  rk.textContent=p.label; rk.style.color=RANK_COLOR[key]||'#000';
  document.getElementById('resPrize').textContent=p.name;
  document.getElementById('resMsg').textContent=p.msg;
  overlay.classList.add('show');
  if(key!=='kkwang') burst(key==='1deung'?160:80);
}

document.getElementById('againBtn').addEventListener('click',()=>{
  overlay.classList.remove('show');
  spinning=false; btn.disabled=false; btn.textContent='돌리기!';
});
btn.addEventListener('click',spin);

/* ---------- 컨페티 ---------- */
const cv=document.getElementById('confetti'), cx=cv.getContext('2d');
let parts=[],raf=null;
function resize(){cv.width=innerWidth;cv.height=innerHeight;}
addEventListener('resize',resize);resize();
const COL=['#FFE785','#FFD23F','#866A55','#FFF0B0','#3a2a1a','#FEFAED'];
function burst(n){
  cv.style.display='block';
  for(let i=0;i<n;i++){
    parts.push({x:innerWidth/2,y:innerHeight*0.35,
      vx:(Math.random()-0.5)*14,vy:Math.random()*-14-4,
      g:0.4+Math.random()*0.2,s:6+Math.random()*7,
      c:COL[i%COL.length],a:1,rot:Math.random()*6,vr:(Math.random()-0.5)*0.4});
  }
  if(!raf)raf=requestAnimationFrame(loop);
}
function loop(){
  cx.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.a-=0.008;
    cx.save();cx.globalAlpha=Math.max(p.a,0);cx.translate(p.x,p.y);cx.rotate(p.rot);
    cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);cx.restore();});
  parts=parts.filter(p=>p.a>0&&p.y<cv.height+40);
  if(parts.length){raf=requestAnimationFrame(loop);}
  else{raf=null;cv.style.display='none';cx.clearRect(0,0,cv.width,cv.height);}
}
</script>
